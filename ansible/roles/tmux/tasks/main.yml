# $schema https://raw.githubusercontent.com/ansible/ansible-lint/main/src/ansiblelint/schemas/ansible.json#/$defs/tasks
- name: install dependencies
  become: true
  community.general.pacman:
    name: tmux

- name: setup links
  ansible.builtin.file:
    src: "{{ dots_dir }}/.config/tmux"
    dest: "{{ ansible_facts['env']['HOME'] }}/.config/tmux"
    state: link

- name: create themes directory
  ansible.builtin.file:
    path: "{{ ansible_facts['env']['HOME'] }}/.config/tmux/themes"
    state: directory

- name: download tokynonight theme
  ansible.builtin.get_url:
    url: https://github.com/folke/tokyonight.nvim/raw/refs/heads/main/extras/tmux/tokyonight_night.tmux
    dest: "{{ ansible_facts['env']['HOME'] }}/.config/tmux/themes/tokyonight_night.tmux"

- name: setup tmux service unit
  ansible.builtin.copy:
    src: tmux.service
    dest: "{{ ansible_facts['env']['HOME'] }}/.config/systemd/user/"

- name: enable/start tmux service
  ansible.builtin.systemd_service:
    name: tmux.service
    scope: user
    enabled: true
    state: started

- name: clone tmux package manager
  ansible.builtin.git:
    repo: https://github.com/tmux-plugins/tpm
    dest: "{{ ansible_facts['env']['HOME'] }}/.config/tmux/plugins/tpm"
